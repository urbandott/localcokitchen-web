<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#fffaf1">
    <link rel="canonical" href="https://localcokitchen.com/signin/">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>Sign In | LocalCoKitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css?v=20260525">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/js/supabase-config.js" defer></script>
    <script src="/js/auth-nav.js" defer></script>
    <script src="/js/password-policy.js" defer></script>
    <script src="/js/auth.js" defer></script>
  </head>
  <body>
    <header class="top-nav">
      <a class="brand nav-brand" href="/" aria-label="LocalCoKitchen home">
        <img src="/images/logo.svg" alt="LocalCoKitchen">
      </a>
      <nav class="nav-actions" aria-label="Primary navigation">
        <a class="nav-icon-link" href="/menu/" aria-label="Open available menu">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35"></path>
            <circle cx="11" cy="11" r="7"></circle>
          </svg>
          <span>Menu</span>
        </a>
        <a class="nav-button" href="/signin/" data-auth-nav>Sign in</a>
        <div class="nav-more">
          <button class="nav-more__button nav-more__button--icon" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open navigation menu"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg></button>
          <div class="nav-more__menu" role="menu">
            <a href="/" role="menuitem">Home</a>
            <a href="/find-a-meal/" role="menuitem">Find a meal</a>
            <a href="/sell-your-food/" role="menuitem">Sell your Food</a>
            <a href="/how-it-works/" role="menuitem">How it works</a>
            <a href="/mission/" role="menuitem">Mission</a>
            <a href="/faq/" role="menuitem">FAQ</a>
            <a href="/contact-us/" role="menuitem">Contact us</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-shell auth-shell--with-nav">

      <section class="auth-panel" aria-labelledby="signin-title">
        <div class="auth-copy">
          <p class="eyebrow">Welcome back</p>
          <h1 id="signin-title">Sign in to LocalCoKitchen.</h1>
          <p>
            Access customer ordering, cook onboarding, and marketplace tools as
            they become available.
          </p>
        </div>

        <div class="auth-card">
          <form class="auth-form" data-auth-form="signin">
            <div class="field-stack">
              <label for="signin-email">Email address</label>
              <input
                id="signin-email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
              >
            </div>
            <div class="field-stack">
              <label for="signin-password">Password</label>
              <input
                id="signin-password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              >
            </div>
            <button class="auth-submit" type="submit">Sign in</button>
          </form>

          <a class="text-link" href="/forgot-password/">Forgot password?</a>

          <p class="auth-message" id="auth-status" aria-live="polite"></p>

          <p class="auth-note">
            New to LocalCoKitchen? <a href="/signup/">Create an account</a>.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
