<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#fffaf1">
    <link rel="canonical" href="https://localcokitchen.com/signin/">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>Sign In | LocalCoKitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="../styles.css?v=20260524-auth">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/js/supabase-config.js" defer></script>
    <script src="/js/password-policy.js" defer></script>
    <script src="/js/auth.js" defer></script>
  </head>
  <body>
    <main class="auth-shell">
      <header class="auth-header">
        <a class="brand" href="/" aria-label="LocalCoKitchen home">
          <img src="/images/logo.svg" alt="LocalCoKitchen">
        </a>
      </header>

      <section class="auth-panel" aria-labelledby="signin-title">
        <div class="auth-copy">
          <p class="eyebrow">Welcome back</p>
          <h1 id="signin-title">Sign in to LocalCoKitchen.</h1>
          <p>
            Access customer ordering, cook onboarding, and marketplace tools as
            they become available.
          </p>
        </div>

        <div class="auth-card">
          <form class="auth-form" data-auth-form="signin">
            <div class="field-stack">
              <label for="signin-email">Email address</label>
              <input
                id="signin-email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
              >
            </div>
            <div class="field-stack">
              <label for="signin-password">Password</label>
              <input
                id="signin-password"
                name="password"
                type="password"
                autocomplete="current-password"
                minlength="8"
                required
              >
            </div>
            <button class="auth-submit" type="submit">Sign in</button>
          </form>

          <a class="text-link" href="/forgot-password/">Forgot password?</a>

          <p class="auth-note" id="auth-status" aria-live="polite">
            New to LocalCoKitchen? <a href="/signup/">Create an account</a>.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
